<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>房東主控台 - 即時計費版</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
	<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col pb-24">

    <div class="bg-amber-50 border-b border-amber-200 text-amber-900 px-4 py-2 text-xs flex justify-between items-center shadow-xs">
        <div class="flex items-center space-x-2">
            <span class="font-bold">系統時間測試器：</span>
            <select id="mock-date-selector" onchange="changeMockDate()" class="bg-white border border-amber-300 rounded p-1 text-xs">
                <option value="">伺服器真實時間</option>
                <option value="2026-05-15 12:00:00">模擬為：2026年05月</option>
                <option value="2026-06-01 09:00:00">跳躍至：2026年06月 (測試是否自動重置變回紅燈)</option>
                <option value="2026-07-10 14:00:00">跳躍至：2026年07月</option>
            </select>
        </div>
        <p class="text-amber-700 italic">切換下拉選單，即可測試跨月自動更新機制</p>
    </div>

    <header class="bg-white shadow-md sticky top-0 z-40">
        <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex space-x-4">
                <button id="btn-contracts" onclick="switchView('contracts')" class="px-5 py-2 rounded-lg font-medium transition shadow-sm">進行中合約頁</button>
                <button id="btn-properties" onclick="switchView('properties')" class="px-5 py-2 rounded-lg font-medium transition shadow-sm">出租處管理</button>
                <button id="btn-history" onclick="switchView('history')" class="px-5 py-2 rounded-lg font-medium transition shadow-sm">歷史合約</button>
            </div>
            <div class="flex items-center space-x-3 text-sm">
                <span id="user-display" class="text-gray-600 font-semibold">房東</span>
                <button onclick="logout()" class="text-red-500 hover:underline">登出</button>
            </div>
        </div>
    </header>

    <main class="flex-grow max-w-6xl w-full mx-auto px-4 py-8">
        <h2 id="view-title" class="text-2xl font-bold text-slate-800 mb-6">讀取中...</h2>
        <div id="content-list" class="grid grid-cols-1 gap-4"></div>
    </main>

    <div id="floating-btn-container" class="fixed bottom-6 right-6"></div>

    <div id="modal-property" class="fixed inset-0 bg-black/50 flex items-center justify-center hidden z-50 p-4">
        <div class="bg-white rounded-xl shadow-xl max-w-md w-full p-6">
            <h3 id="prop-modal-title" class="text-xl font-bold mb-4">房屋資產表單</h3>
            <form id="form-property" onsubmit="saveProperty(event)" class="space-y-3">
                <input type="hidden" id="prop-id">
                <input type="hidden" id="prop-image-url" value="noimage">
                
                <div>
                    <label class="text-sm font-medium block mb-1">上傳房屋圖片</label>
                    <div class="flex items-center space-x-3">
                        <div id="prop-img-preview-box" class="w-16 h-16 bg-gray-100 rounded border flex items-center justify-center text-xs text-gray-400 overflow-hidden">無圖片</div>
                        <input type="file" id="prop-file-input" onchange="uploadImageHandler()" accept="image/*" class="text-xs text-gray-600">
                    </div>
                </div>

                <div><label class="text-sm font-medium">房屋名稱</label><input type="text" id="prop-name" required class="w-full p-2 border rounded"></div>
                <div><label class="text-sm font-medium">完整地址</label><input type="text" id="prop-address" required class="w-full p-2 border rounded"></div>
                <div>
                    <label class="text-sm font-medium">房型分類</label>
                    <select id="prop-type" class="w-full p-2 border rounded">
                        <option>獨立套房</option><option>分租套房</option><option>雅房</option><option>整層住家</option>
                    </select>
                </div>
                <div><label class="text-sm font-medium">預設租金 (NTD/月)</label><input type="number" id="prop-rent" required class="w-full p-2 border rounded"></div>
                <div><label class="text-sm font-medium">備註</label><textarea id="prop-notes" class="w-full p-2 border rounded rows-2"></textarea></div>
                <div class="flex justify-end space-x-2 pt-2">
                    <button type="button" onclick="closeModal('modal-property')" class="px-4 py-2 bg-gray-200 rounded text-sm">取消</button>
                    <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded text-sm">儲存房屋</button>
                </div>
            </form>
        </div>
    </div>

    <div id="modal-contract" class="fixed inset-0 bg-black/50 flex items-center justify-center hidden z-50 p-4 overflow-y-auto">
        <div class="bg-white rounded-xl shadow-xl max-w-lg w-full p-6 my-8">
            <h3 id="contract-modal-title" class="text-xl font-bold mb-4">租賃合約表單</h3>
            <form id="form-contract" onsubmit="saveContract(event)" class="space-y-3">
                <input type="hidden" id="contract-id">
                <div>
                    <label class="text-sm font-medium">綁定租屋處物件</label>
                    <select id="contract-prop-id" required class="w-full p-2 border rounded"></select>
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <div><label class="text-sm font-medium">租客姓名</label><input type="text" id="contract-tenant-name" required class="w-full p-2 border rounded"></div>
                    <div><label class="text-sm font-medium">房型分類</label>
                        <select id="contract-room-type" class="w-full p-2 border rounded">
                            <option>獨立套房</option><option>分租套房</option><option>雅房</option><option>整層住家</option>
                        </select>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <div><label class="text-sm font-medium">租客身分證字號</label><input type="text" id="contract-tenant-id" required class="w-full p-2 border rounded"></div>
                    <div><label class="text-sm font-medium">租客電話</label><input type="text" id="contract-tenant-phone" required class="w-full p-2 border rounded"></div>
                </div>
                <div><label class="text-sm font-medium">合約租期</label><input type="text" id="contract-period" required class="w-full p-2 border rounded" placeholder="2026/05/01-2027/05/01"></div>
                <div>
                    <label class="text-sm font-medium">收租確認狀態</label>
                    <select id="contract-status" class="w-full p-2 border rounded">
                        <option value="本月已繳">本月已繳</option>
                        <option value="待確認/逾期">待確認/逾期</option>
                    </select>
                </div>
                <div class="grid grid-cols-3 gap-2">
                    <div><label class="text-sm font-medium">租金(月)</label><input type="number" id="contract-rent" required class="w-full p-2 border rounded"></div>
                    <div><label class="text-sm font-medium">水費(月)</label><input type="number" id="contract-water" required class="w-full p-2 border rounded"></div>
                    <div><label class="text-sm font-medium">電費(度)</label><input type="number" id="contract-electricity" required class="w-full p-2 border rounded"></div>
                </div>
                <div><label class="text-sm font-medium">備註</label><textarea id="contract-notes" class="w-full p-2 border rounded rows-2"></textarea></div>
                <div class="flex justify-end space-x-2 pt-2">
                    <button type="button" onclick="closeModal('modal-contract')" class="px-4 py-2 bg-gray-200 rounded text-sm">取消</button>
                    <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded text-sm">儲存合約</button>
                </div>
            </form>
        </div>
    </div>

    <div id="modal-history-view" class="fixed inset-0 bg-black/50 flex items-center justify-center hidden z-50 p-4">
        <div class="bg-white rounded-xl shadow-xl max-w-md w-full p-6">
            <h3 class="text-xl font-bold mb-2 text-slate-800">歷史繳費明細清單</h3>
            <p class="text-xs text-gray-400 mb-4">此合約在資料庫中的所有成功實質入帳紀錄</p>
            <div id="history-logs-container" class="border-l-2 border-blue-500 pl-4 space-y-3 my-4 max-h-60 overflow-y-auto text-sm"></div>
            <div class="flex justify-end pt-2">
                <button onclick="closeModal('modal-history-view')" class="px-4 py-2 bg-gray-500 text-white text-sm rounded hover:bg-gray-600">關閉</button>
            </div>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('token');
        if (!token) { window.location.href = '/'; }
        document.getElementById('user-display').textContent = `房東：${localStorage.getItem('username') || '使用者'}`;

        let currentView = 'contracts';
        let cacheProperties = [];
        let cacheContracts = [];
        let mockDateValue = "";

        const NO_IMAGE_SVG = `<svg class="w-full h-full text-gray-300 bg-gray-100" fill="currentColor" viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V5h14v14zm-5.04-6.71l-2.75 3.54-1.96-2.36L6.5 17h11l-3.54-4.71z"/></svg>`;

        function logout() { localStorage.clear(); window.location.href = '/'; }
        function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

        function changeMockDate() {
            mockDateValue = document.getElementById('mock-date-selector').value;
            fetchAndRenderData();
        }

        async function apiFetch(url, method = 'GET', body = null) {
            const options = {
                method: method,
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }
            };
            if (mockDateValue) options.headers['X-Mock-Date'] = mockDateValue;
            if (body) options.body = JSON.stringify(body);
            const res = await fetch(url, options);
            if(res.status === 401) logout();
            return res.json();
        }

        async function uploadImageHandler() {
            const fileInput = document.getElementById('prop-file-input');
            if (fileInput.files.length === 0) return;
            const formData = new FormData();
            formData.append('file', fileInput.files[0]);

            const res = await fetch('/api/upload', {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}` },
                body: formData
            });
            const data = await res.json();
            if (res.ok) {
                document.getElementById('prop-image-url').value = data.url;
                document.getElementById('prop-img-preview-box').innerHTML = `<img src="${data.url}" class="w-full h-full object-cover">`;
            } else {
				Swal.fire({
						icon: 'error',
						title: '圖片上傳失敗：',
						text: data.message
					});
            }
        }

        function switchView(view) {
            currentView = view;
            const tabs = { contracts: document.getElementById('btn-contracts'), properties: document.getElementById('btn-properties'), history: document.getElementById('btn-history') };
            Object.keys(tabs).forEach(k => {
                tabs[k].className = (k === view) ? "px-5 py-2 rounded-lg font-medium bg-blue-600 text-white shadow-sm" : "px-5 py-2 rounded-lg font-medium bg-white text-gray-700 hover:bg-gray-100 shadow-sm";
            });

            const floatBtnContainer = document.getElementById('floating-btn-container');
            const viewTitle = document.getElementById('view-title');
            
            if (view === 'contracts') {
                viewTitle.textContent = "進行中合約管理";
                floatBtnContainer.innerHTML = `<button onclick="showContractForm()" class="bg-blue-600 text-white px-6 py-3 rounded-full font-semibold shadow-md hover:bg-blue-700 transition">+ 新增合約</button>`;
            } else if (view === 'properties') {
                viewTitle.textContent = "出租處物業資產列表";
                floatBtnContainer.innerHTML = `<button onclick="showPropertyForm()" class="bg-emerald-600 text-white px-6 py-3 rounded-full font-semibold shadow-md hover:bg-emerald-700 transition">+ 新增出租處</button>`;
            } else if (view === 'history') {
                viewTitle.textContent = "歷史結案合約檔案區";
                floatBtnContainer.innerHTML = '';
            }
            fetchAndRenderData();
        }

        async function fetchAndRenderData() {
            const listContainer = document.getElementById('content-list');
            listContainer.innerHTML = `<p class="text-gray-400 text-center py-4">資料同步中...</p>`;

            cacheProperties = await apiFetch('/api/properties');
            cacheContracts = await apiFetch('/api/contracts');
            listContainer.innerHTML = '';

            if (currentView === 'properties') {
                if (cacheProperties.length === 0) { listContainer.innerHTML = `<p class="text-gray-400 py-4 text-center">無資產，請新增。</p>`; return; }
                cacheProperties.forEach(p => {
                    const card = document.createElement('div');
                    card.className = "bg-white border rounded-xl p-4 flex flex-col md:flex-row justify-between items-start md:items-center shadow-xs hover:shadow-sm cursor-pointer";
                    card.setAttribute('onclick', `showPropertyForm(${p.id})`);
                    
                    const imgTag = (p.image_url === 'noimage') ? NO_IMAGE_SVG : `<img src="${p.image_url}" class="w-full h-full object-cover">`;
                    
                    card.innerHTML = `
                        <div class="flex items-center space-x-4">
                            <div class="w-16 h-16 rounded-lg overflow-hidden border shrink-0">${imgTag}</div>
                            <div>
                                <h4 class="font-bold text-gray-800 text-lg">${p.name} <span class="text-xs bg-slate-100 text-slate-500 px-2 py-0.5 rounded ml-2">${p.type}</span></h4>
                                <p class="text-xs text-gray-500 mt-1">📍 ${p.address}</p>
                            </div>
                        </div>
                        <div class="text-right mt-2 md:mt-0" onclick="event.stopPropagation()">
                            <p class="text-emerald-600 font-bold">NTD ${p.rent.toLocaleString()} / 月</p>
                        </div>
                    `;
                    listContainer.appendChild(card);
                });
            } else {
                const filterActive = currentView === 'contracts' ? 1 : 0;
                const filteredContracts = cacheContracts.filter(c => c.is_active === filterActive);

                if (filteredContracts.length === 0) { listContainer.innerHTML = `<p class="text-gray-400 py-4 text-center">此分頁無合約明細。</p>`; return; }

                filteredContracts.forEach(c => {
                    const isPaid = c.payment_status === '本月已繳';
                    const statusBadge = isPaid 
                        ? `<span class="bg-emerald-100 text-emerald-800 text-xs px-2.5 py-1 rounded-full font-semibold flex items-center"><span class="w-2 h-2 rounded-full bg-emerald-500 mr-1.5"></span>本月已繳</span>`
                        : `<span class="bg-red-100 text-red-800 text-xs px-2.5 py-1 rounded-full font-semibold flex items-center"><span class="w-2 h-2 rounded-full bg-red-500 mr-1.5"></span>待確認/逾期</span>`;

                    const imgTag = (c.property_image === 'noimage') ? NO_IMAGE_SVG : `<img src="${c.property_image}" class="w-full h-full object-cover">`;
                    const card = document.createElement('div');
                    card.className = "bg-white border rounded-xl p-4 flex flex-col shadow-xs hover:shadow-sm cursor-pointer";
                    card.setAttribute('onclick', `showContractForm(${c.id})`);
                    
                    card.innerHTML = `
                        <div class="flex flex-col md:flex-row md:items-center justify-between items-start">
                            <div class="flex flex-col md:flex-row md:items-center space-y-2 md:space-y-0 md:space-x-4 flex-grow">
                                <div class="w-20 h-14 rounded-lg overflow-hidden border shrink-0">${imgTag}</div>
                                <div class="grid grid-cols-1 md:grid-cols-4 gap-2 w-full text-sm">
                                    <div><h4 class="font-bold text-gray-800">${c.property_name}</h4><p class="text-xs text-gray-400">${c.room_type}</p></div>
                                    <div><span class="text-gray-400 text-xs">租客</span><p class="font-medium">${c.tenant_name}</p></div>
                                    <div><span class="text-gray-400 text-xs">租期</span><p class="text-xs font-mono">${c.contract_period}</p></div>
                                    <div class="flex items-center">${statusBadge}</div>
                                </div>
                            </div>
                            <div class="flex space-x-2 mt-4 md:mt-0 pl-0 md:pl-4 justify-end w-full md:w-auto" onclick="event.stopPropagation()">
                                ${(!isPaid && currentView === 'contracts') ? `<button onclick="toggleBillingBox(${c.id})" class="px-2.5 py-1 bg-amber-500 text-white rounded text-xs font-bold hover:bg-amber-600 transition">確認收租</button>` : ''}
                                <button onclick="showPaymentHistoryModal(${c.id})" class="px-2 py-1 bg-slate-100 hover:bg-slate-200 text-gray-700 rounded text-xs">歷史紀錄</button>
                                ${currentView === 'contracts' ? `<button onclick="terminateContract(${c.id})" class="px-2 py-1 bg-red-500 text-white rounded text-xs hover:bg-red-600">終止合約</button>` : ''}
                            </div>
                        </div>

                        <div id="billing-box-${c.id}" class="hidden mt-4 pt-4 border-t border-dashed border-slate-200 bg-slate-50 p-4 rounded-lg cursor-default" onclick="event.stopPropagation()">
                            <div class="flex justify-between items-center mb-3">
                                <p class="text-xs font-bold text-blue-600 flex items-center">本月月租即時試算表</p>
                                <span class="text-[11px] bg-amber-100 text-amber-800 px-2 py-0.5 rounded">公式："基本租金" + [水費] + "電費單價" × [用電量] = 本月月租</span>
                            </div>
                            <div class="grid grid-cols-2 md:grid-cols-5 gap-4 items-center text-xs">
                                <div class="bg-white p-2 rounded border border-slate-200">
                                    <label class="block text-gray-400 mb-1">"基本租金"</label>
                                    <span class="font-mono font-bold text-gray-700 text-sm">$${c.rent.toLocaleString()}</span>
                                </div>
                                <div class="bg-white p-2 rounded border border-slate-200">
                                    <label class="block text-blue-500 font-medium mb-0.5">[水費] (可修改)</label>
                                    <input type="number" id="live-water-${c.id}" value="${c.water}" oninput="calculateLiveTotal(${c.id}, ${c.rent}, ${c.electricity})" class="w-full font-mono bg-slate-50 border border-slate-300 rounded px-1.5 py-0.5 text-sm font-bold text-gray-800 focus:bg-white focus:outline-none">
                                </div>
                                <div class="bg-white p-2 rounded border border-slate-200">
                                    <label class="block text-gray-400 mb-1">"電費單價"</label>
                                    <span class="font-mono font-bold text-gray-700 text-sm">$${c.electricity} / 度</span>
                                </div>
                                <div class="bg-white p-2 rounded border border-slate-200">
                                    <label class="block text-blue-500 font-medium mb-0.5">[本月用電量] (度)</label>
                                    <input type="number" id="live-usage-${c.id}" value="0" step="0.1" min="0" oninput="calculateLiveTotal(${c.id}, ${c.rent}, ${c.electricity})" class="w-full font-mono bg-amber-50 border border-amber-300 rounded px-1.5 py-0.5 text-sm font-bold text-gray-800 focus:bg-white focus:outline-none" placeholder="0.0">
                                </div>
                                <div class="col-span-2 md:col-span-1 text-right bg-blue-600 p-2.5 rounded-lg shadow-inner text-white">
                                    <label class="block text-[10px] text-blue-200 font-medium">總計</label>
                                    <span id="live-total-${c.id}" class="text-base font-black font-mono">$${(c.rent + c.water).toLocaleString()}</span>
                                </div>
                            </div>
                            <div class="mt-3 flex justify-end space-x-2">
                                <button onclick="toggleBillingBox(${c.id})" class="px-3 py-1 bg-gray-300 text-gray-700 rounded text-xs hover:bg-gray-400 transition">關閉</button>
                                <button onclick="submitBilling(${c.id})" class="px-4 py-1 bg-blue-600 text-white rounded text-xs font-bold hover:bg-blue-700 shadow-sm transition">確認送出並記帳</button>
                            </div>
                        </div>
                    `;
                    listContainer.appendChild(card);
                });
            }
        }

        // 切換顯示/隱藏內嵌式計算表格
        function toggleBillingBox(cid) {
            const box = document.getElementById(`billing-box-${cid}`);
            box.classList.toggle('hidden');
        }

        // 前端即時公式連動引擎
        function calculateLiveTotal(cid, rent, electricityRate) {
            const waterInput = document.getElementById(`live-water-${cid}`);
            const usageInput = document.getElementById(`live-usage-${cid}`);
            const totalDisplay = document.getElementById(`live-total-${cid}`);

            const waterFee = parseInt(waterInput.value) || 0;
            const elecUsage = parseFloat(usageInput.value) || 0;

            // 即時計算
            const total = Math.round(rent + waterFee + (electricityRate * elecUsage));
            totalDisplay.textContent = `$${total.toLocaleString()}`;
        }

        // 送出即時表格資料到資料庫
        async function submitBilling(cid) {
            const waterFee = parseInt(document.getElementById(`live-water-${cid}`).value) || 0;
            const elecUsage = parseFloat(document.getElementById(`live-usage-${cid}`).value) || 0;

            if (elecUsage < 0 || waterFee < 0) {
                alert("請輸入正確的正整數金額或用電度數！");
                return;
            }

            const res = await apiFetch(`/api/contracts/${cid}/pay_confirm`, 'POST', {
                electricity_usage: elecUsage,
                water_fee: waterFee
            });
            Swal.fire({
						icon: 'success',
						title: '成功',
						text: res.message
					});
            fetchAndRenderData();
        }

        async function showPaymentHistoryModal(cid) {
            const container = document.getElementById('history-logs-container');
            container.innerHTML = '載入紀錄中...';
            openModal('modal-history-view');

            const logs = await apiFetch(`/api/contracts/${cid}/payments`);
            container.innerHTML = '';
            if(logs.length === 0) {
                container.innerHTML = `<p class="text-gray-400 text-center py-2">目前尚無任何實值收租入帳紀錄。</p>`;
                return;
            }
            logs.forEach(log => {
                container.innerHTML += `
                    <div class="border-b border-gray-100 pb-2">
                        <div class="flex justify-between font-medium">
                            <span class="text-emerald-600">✓ ${log.payment_month} 月份房租收訖</span>
                            <span class="text-slate-700">$${log.amount.toLocaleString()} NTD</span>
                        </div>
                        <p class="text-xs text-gray-400 mt-0.5 font-sans">流水號細節：${log.paid_at}</p>
                    </div>
                `;
            });
        }

        function showPropertyForm(id = null) {
            document.getElementById('form-property').reset();
            document.getElementById('prop-id').value = '';
            document.getElementById('prop-image-url').value = 'noimage';
            document.getElementById('prop-img-preview-box').innerHTML = '無圖片';
            document.getElementById('prop-modal-title').textContent = id ? "編輯出租處物件" : "新增出租處物件";

            if (id) {
                const item = cacheProperties.find(p => p.id === id);
                if (item) {
                    document.getElementById('prop-id').value = item.id;
                    document.getElementById('prop-name').value = item.name;
                    document.getElementById('prop-address').value = item.address;
                    document.getElementById('prop-type').value = item.type;
                    document.getElementById('prop-rent').value = item.rent;
                    document.getElementById('prop-notes').value = item.notes;
                    document.getElementById('prop-image-url').value = item.image_url;
                    if(item.image_url !== 'noimage') {
                        document.getElementById('prop-img-preview-box').innerHTML = `<img src="${item.image_url}" class="w-full h-full object-cover">`;
                    }
                }
            }
            openModal('modal-property');
        }

        async function saveProperty(e) {
            e.preventDefault();
            const payload = {
                id: document.getElementById('prop-id').value || null,
                name: document.getElementById('prop-name').value,
                address: document.getElementById('prop-address').value,
                type: document.getElementById('prop-type').value,
                rent: parseInt(document.getElementById('prop-rent').value),
                notes: document.getElementById('prop-notes').value,
                image_url: document.getElementById('prop-image-url').value
            };
            await apiFetch('/api/properties', 'POST', payload);
            closeModal('modal-property');
            fetchAndRenderData();
        }

        function showContractForm(id = null) {
            document.getElementById('form-contract').reset();
            document.getElementById('contract-id').value = '';
            
            const selectProp = document.getElementById('contract-prop-id');
            selectProp.innerHTML = '';
            if(cacheProperties.length === 0) {
				Swal.fire({
						icon: 'error',
						title: '無資產物件',
						text: '請先建立出租處！'
					});
				switchView('properties');
				return; 
				}
            cacheProperties.forEach(p => { selectProp.innerHTML += `<option value="${p.id}">${p.name}</option>`; });

            if (id) {
                const item = cacheContracts.find(c => c.id === id);
                if (item) {
                    document.getElementById('contract-id').value = item.id;
                    document.getElementById('contract-prop-id').value = item.property_id;
                    document.getElementById('contract-tenant-name').value = item.tenant_name;
                    document.getElementById('contract-room-type').value = item.room_type;
                    document.getElementById('contract-tenant-id').value = item.tenant_id_card;
                    document.getElementById('contract-tenant-phone').value = item.tenant_phone;
                    document.getElementById('contract-period').value = item.contract_period;
                    document.getElementById('contract-status').value = item.payment_status;
                    document.getElementById('contract-rent').value = item.rent;
                    document.getElementById('contract-water').value = item.water;
                    document.getElementById('contract-electricity').value = item.electricity;
                    document.getElementById('contract-notes').value = item.notes;
                }
            }
            openModal('modal-contract');
        }

        async function saveContract(e) {
            e.preventDefault();
            const payload = {
                id: document.getElementById('contract-id').value || null,
                property_id: parseInt(document.getElementById('contract-prop-id').value),
                tenant_name: document.getElementById('contract-tenant-name').value,
                room_type: document.getElementById('contract-room-type').value,
                tenant_id_card: document.getElementById('contract-tenant-id').value,
                tenant_phone: document.getElementById('contract-tenant-phone').value,
                contract_period: document.getElementById('contract-period').value,
                payment_status: document.getElementById('contract-status').value,
                rent: parseInt(document.getElementById('contract-rent').value),
                water: parseInt(document.getElementById('contract-water').value),
                electricity: parseFloat(document.getElementById('contract-electricity').value),
                notes: document.getElementById('contract-notes').value
            };
            await apiFetch('/api/contracts', 'POST', payload);
            closeModal('modal-contract');
            fetchAndRenderData();
        }

        async function terminateContract(id) {
            if(confirm("確定終止此合約？ 一旦終止將封存移至歷史合約區。")) {
                await apiFetch(`/api/contracts/${id}/terminate`, 'POST');
                fetchAndRenderData();
            }
        }

        switchView('contracts');
    </script>
</body>
</html>
